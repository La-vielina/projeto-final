<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro</title>
  
  <link rel="stylesheet" href="cadastro.css">
 
</head>
<body>
  <div class="card">
    <img src="imagens-visual/logo1.png" alt="logo" class="logo">

    <div class="dados">
      <div class="dados-texto"><strong>Nome Completo</strong></div>
      <input type="texto" placeholder="Digite seu nome completo" />
    </div>

    <div class="spacer"></div>

    <div class="dados">
      <div class="dados-texto"><strong>E-mail</strong></div>
      <input type="email" placeholder="Digite seu e-mail" />
    </div>

    <div class="spacer"></div>

    <div class="spacer"></div>

    <div class="dados">
      <div class="dados-texto"><strong>Senha</strong></div>
      <div class="dados-senha">
        <input type="senha" placeholder="Crie uma senha" />
      </div>
    </div>

    <button class="cadastrar">Cadastrar</button>

    <div class="rodape-links">
      <a href="login.html"><img src="imagens-icons/casa.png" alt="">Entrar</a>
     
    </div>
  </div>

</body>
</html>
