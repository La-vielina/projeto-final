<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title> 

  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<nav>
    <img src="imagens-visual/logo2.png" alt="entrelinhas" class="logo">

    <ul class="nav-abas">
      <li><a href="index.html">Início</a></li>
      <li><a href="sobre.html">Sobre Nós</a></li>
    </ul>

    <div class="nav-direita">

       <a class="nav-icone" href="carrinho.html">
        <img src="imagens-icons/carrinho.png" alt="carrinho" class="carrinho">
      </a>

       <a class="nav-icone" href="dashboard.html">
        <img src="imagens-icons/grafico1.png" alt="dashboard" class="dashboard">
      </a>

      <a class="nav-icone" href="produtos.html">
        <img src="imagens-icons/usuario.png" alt="vendedor" class="perfil-vendedor">
      </a>

    </div>
  </nav>


  <div class="layout">

  <!--INFORMAÇÕES DE CIMA-->

    <main class="principal">
      <div class="indicadores">

        <div class="indicadores-card">
          <span class="indicadores-icon"><img src="imagens-icons/livro-icon.png" alt="livros"></span>
          <div class="indicadores-infos">
            <span class="indicadores-titulo">Total de livros</span>
            <span class="indicadores-valor">36</span>
          </div>
        </div>

        <div class="indicadores-card">
          <span class="indicadores-icon"><img src="imagens-icons/clientes.png" alt="clientes"></span>
          <div class="indicadores-infos">
            <span class="indicadores-titulo">Total de clientes</span>
            <span class="indicadores-valor">0</span>
          </div>
        </div>

      </div>

  <!--INFORMAÇÕES CENTRAIS-->

      <div class="central">
        <div class="painel">
          <div class="painel-titulo"><img src="imagens-icons/produtos.png" alt="estoque">Resumo de estoque</div>
          <div class="estoque-status">

            <div class="estoque-item">
              <span class="estoque-icon"><img src="imagens-icons/livro-icon.png" alt="em-estoque"></span>
              <span class="estoque-disponibilidade">Em estoque</span>
              <span class="estoque-valor">36</span>
            </div>
        </div>

<!--GRÁFICO-->
        <div class="painel">
          <div class="grafico-header">
            <div class="painel-titulo"><img src="imagens-icons/grafico1.png" alt="vendas"> Vendas dos últimos meses</div>
            <a href="#" class="grafico-link">ver ano →</a>
          </div>
          <div style="position:relative; padding-left:30px; margin-top:10px;">

            <div class="grafico-legendas">
              <span>0</span>
              <span>20</span>
              <span>40</span>
              <span>60</span>
              <span>80</span>
            </div>

            <div class="grafico-area">
              <div class="grupo-barra">
                <div class="grafico-barra" style="height:2px;"></div>
                <span class="data-barra">Jan</span>
              </div>

              <div class="grupo-barra">
                <div class="grafico-barra" style="height:2px;"></div>
                <span class="data-barra">Fev</span>
              </div>

              <div class="grupo-barra">
                <div class="grafico-barra" style="height:2px;"></div>
                <span class="data-barra">Mar</span>
              </div>

              <div class="grupo-barra">
                <div class="grafico-barra" style="height:2px;"></div>
                <span class="data-barra">Abr</span>
              </div>

              <div class="grupo-barra">
                <div class="grafico-barra" style="height:2px;"></div>
                <span class="data-barra">Mai</span>
              </div>

              <div class="grupo-barra">
                <div class="grafico-barra" style="height:2px;"></div>
                <span class="data-barra">Jun</span>
              </div>

            </div>
          </div>
        </div>

      </div>

<!--INFORMAÇÕES DE BAIXO-->
        <div class="painel">
          <div class="header-pedidos">
            <div class="painel-titulo" style="margin-bottom:0;"><img src="imagens-icons/carrinho.png" alt="pedidos"> Pedidos recentes</div>
            <button class="ver-botao">ver todos</button>
          </div>
          <div class="tabela-pedidos-header">
            <span>Pedido</span>
            <span>Cliente</span>
            <span>Data</span>
            <span>Status</span>
            <span>Total</span>
          </div>
          <div class="pedidos">Nenhum pedido ainda.</div>
        </div>

      </div>

    </main>
  </div>

</body>
</html>
